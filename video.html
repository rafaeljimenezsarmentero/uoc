<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataformas de publicación y distribución</title>
  <style>
    body {
      background-color: silver;
      text-align: center;
      padding: 2em;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: black;
      padding: 1em;
      border-radius: 1em
    }
    video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 1em;
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <video controls width="100%" preload="metadata">
        <source src="video-2.mp4" type="video/mp4">
      </video>
    </div>
  </main>
</body>
</html>
